{{ define "main" }}
<section class="page-head">
  <p class="eyebrow">Browse</p>
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="intro">{{ . }}</div>{{ end }}
</section>

{{ partial "filter-toolbar.html" . }}
<div class="term-grid" data-filter-list>
  {{ range $name, $taxonomy := site.Taxonomies }}
    <a class="term-card filter-item" href="{{ printf "%s/" $name | relURL }}">
      <span>{{ humanize $name }}</span>
      <em>{{ len $taxonomy }} terms</em>
    </a>
  {{ end }}
</div>
{{ end }}
